<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Chatbot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh; }
    #chat-container { background: white; width: 400px; height: 600px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
    #chat-header { background: #2E75B6; color: white; padding: 16px; border-radius: 12px 12px 0 0; font-weight: bold; font-size: 16px; }
    #chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .message { max-width: 80%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; }
    .bot { background: #f0f0f0; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; }
    .user { background: #2E75B6; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    #chat-input { display: flex; padding: 12px; border-top: 1px solid #eee; gap: 8px; }
    #input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 20px; outline: none; font-size: 14px; }
    #send { background: #2E75B6; color: white; border: none; padding: 10px 18px; border-radius: 20px; cursor: pointer; font-size: 14px; }
    #send:hover { background: #1F5A9E; }
    .typing { color: #999; font-style: italic; font-size: 13px; }
  </style>
</head>
<body>
  <div id="chat-container">
    <div id="chat-header">🤖 AI Assistant</div>
    <div id="chat-messages">
      <div class="message bot">Hello! How can I help you today?</div>
    </div>
    <div id="chat-input">
      <input id="input" type="text" placeholder="Type a message..." />
      <button id="send">Send</button>
    </div>
  </div>

  <script>
    const SERVER_URL = 'chatbot-production-99fa.up.railway.app';
    const SYSTEM_PROMPT = 'You are a helpful assistant.';

    const messages = [];
    const chatMessages = document.getElementById('chat-messages');
    const input = document.getElementById('input');
    const send = document.getElementById('send');

    function addMessage(text, role) {
      const div = document.createElement('div');
      div.className = 'message ' + (role === 'user' ? 'user' : 'bot');
      div.textContent = text;
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      addMessage(text, 'user');
      messages.push({ role: 'user', content: text });

      const typing = document.createElement('div');
      typing.className = 'message bot typing';
      typing.textContent = 'Typing...';
      chatMessages.appendChild(typing);

      const response = await fetch(SERVER_URL + '/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages, systemPrompt: SYSTEM_PROMPT })
      });

      const data = await response.json();
      typing.remove();
      messages.push({ role: 'assistant', content: data.reply });
      addMessage(data.reply, 'bot');
    }

    send.addEventListener('click', sendMessage);
    input.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
  </script>
</body>
</html>
